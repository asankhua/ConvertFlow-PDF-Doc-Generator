<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ConvertFlow - Universal Document Suite</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Babel Standalone (for in-browser JSX compilation) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    body { margin: 0; padding: 0; font-family: sans-serif; }
  </style>
</head>
<body>
  <!-- React Mount Point -->
  <div id="root"></div>

  <!-- React App Code -->
  <script type="text/babel" data-type="module">
    import React, { useState, useRef } from 'https://esm.sh/react@18.2.0';
    import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
    import { 
      FileUp, 
      FileText, 
      Image as ImageIcon, 
      Trash2, 
      Download, 
      Loader2, 
      FilePlus, 
      Settings2,
      CheckCircle2,
      Table as TableIcon,
      FileCode,
      Type,
      FileBox,
      AlertCircle,
      Sun,
      Moon,
      Palette,
      GripVertical,
      List,
      Shield
    } from 'https://esm.sh/lucide-react@0.292.0';

    // Thread yielder to prevent UI freezing on heavy files
    const yieldToMain = () => new Promise(resolve => setTimeout(resolve, 0));

    // Dynamic Script Loader with auto-retry and error boundary
    const loadScript = (src) => {
      return new Promise((resolve, reject) => {
        const existing = document.querySelector(`script[src="${src}"]`);
        if (existing) {
          if (existing.getAttribute('data-loaded') === 'true') return resolve();
          if (existing.getAttribute('data-error') === 'true') {
            existing.remove(); 
          } else {
            existing.addEventListener('load', resolve);
            existing.addEventListener('error', reject);
            return;
          }
        }
        
        const script = document.createElement('script');
        script.src = src;
        script.async = true;
        script.setAttribute('data-loaded', 'false');
        script.onload = () => {
          script.setAttribute('data-loaded', 'true');
          resolve();
        };
        script.onerror = (e) => {
          script.setAttribute('data-error', 'true');
          console.error(`Failed to load script: ${src}`);
          reject(new Error(`Failed to load script: ${src}`));
        };
        document.head.appendChild(script);
      });
    };

    // Theme Definitions - Using exact Hexes
    const ACCENT_COLORS = {
      indigo: { name: 'Indigo', hex: '#5b5fdb', mainBg: 'bg-[#5b5fdb]', mainHover: 'hover:bg-[#4b4fc2]', mainText: 'text-[#5b5fdb]', lightBg: 'bg-[#5b5fdb]/10', border: 'border-[#5b5fdb]', shadow: 'shadow-[#5b5fdb]/20', iconText: 'text-[#5b5fdb]', ring: 'ring-[#5b5fdb]' },
      emerald: { name: 'Emerald', hex: '#72b390', mainBg: 'bg-[#72b390]', mainHover: 'hover:bg-[#609c7b]', mainText: 'text-[#72b390]', lightBg: 'bg-[#72b390]/10', border: 'border-[#72b390]', shadow: 'shadow-[#72b390]/20', iconText: 'text-[#72b390]', ring: 'ring-[#72b390]' },
      rose: { name: 'Rose', hex: '#d9657b', mainBg: 'bg-[#d9657b]', mainHover: 'hover:bg-[#c25468]', mainText: 'text-[#d9657b]', lightBg: 'bg-[#d9657b]/10', border: 'border-[#d9657b]', shadow: 'shadow-[#d9657b]/20', iconText: 'text-[#d9657b]', ring: 'ring-[#d9657b]' },
      amber: { name: 'Amber', hex: '#db9d5e', mainBg: 'bg-[#db9d5e]', mainHover: 'hover:bg-[#c4894d]', mainText: 'text-[#db9d5e]', lightBg: 'bg-[#db9d5e]/10', border: 'border-[#db9d5e]', shadow: 'shadow-[#db9d5e]/20', iconText: 'text-[#db9d5e]', ring: 'ring-[#db9d5e]' },
      cyan: { name: 'Cyan', hex: '#6ca8ba', mainBg: 'bg-[#6ca8ba]', mainHover: 'hover:bg-[#5890a1]', mainText: 'text-[#6ca8ba]', lightBg: 'bg-[#6ca8ba]/10', border: 'border-[#6ca8ba]', shadow: 'shadow-[#6ca8ba]/20', iconText: 'text-[#6ca8ba]', ring: 'ring-[#6ca8ba]' }
    };

    const App = () => {
      const [files, setFiles] = useState([]);
      const [isDragging, setIsDragging] = useState(false);
      const [isGenerating, setIsGenerating] = useState(false);
      const [isDark, setIsDark] = useState(false);
      const [accent, setAccent] = useState('indigo');
      const [pdfStatus, setPdfStatus] = useState('idle');
      const [progressMsg, setProgressMsg] = useState('');
      
      const [settings, setSettings] = useState({
        outputFormat: 'pdf',
        orientation: 'p',
        format: 'a4',
        imageQuality: 'medium' // Add image quality setting
      });
      
      const fileInputRef = useRef(null);
      const dragItem = useRef(null);
      const dragOverItem = useRef(null);

      const ac = ACCENT_COLORS[accent];

      const getFileIcon = (type, name) => {
        const ext = name.split('.').pop().toLowerCase();
        if (type.startsWith('image/')) return <ImageIcon className="text-pink-500" size={20} />;
        if (['doc', 'docx'].includes(ext)) return <FileText className="text-blue-500" size={20} />;
        if (ext === 'pdf') return <FileBox className="text-red-500" size={20} />;
        if (['xls', 'xlsx', 'csv'].includes(ext)) return <TableIcon className="text-emerald-500" size={20} />;
        if (['json', 'js', 'html', 'css', 'ts', 'tsx', 'py', 'java', 'cpp'].includes(ext)) return <FileCode className="text-amber-500" size={20} />;
        return <Type className="text-slate-400" size={20} />;
      };

      const handleFiles = (newFiles) => {
        const validFiles = Array.from(newFiles);
        const mappedFiles = validFiles.map(file => ({
          id: Math.random().toString(36).substr(2, 9),
          file,
          preview: file.type.startsWith('image/') ? URL.createObjectURL(file) : null,
          name: file.name,
          type: file.type,
          size: (file.size / 1024).toFixed(1) + ' KB',
          extension: file.name.split('.').pop().toLowerCase()
        }));

        setFiles(prev => [...prev, ...mappedFiles]);
      };

      const validateFilesForConversion = () => {
        if (settings.outputFormat === 'docx') {
          const pdfFiles = files.filter(file => file.extension === 'pdf');
          if (pdfFiles.length > 0) {
            setPdfStatus('error');
            setProgressMsg(`PDF files cannot be converted to Word format. Found ${pdfFiles.length} PDF file(s).`);
            setTimeout(() => {
              setPdfStatus('idle');
              setProgressMsg('');
            }, 4000);
            return false;
          }
        }
        return true;
      };

      const removeFile = (id) => {
        setFiles(prev => {
          const removed = prev.find(f => f.id === id);
          if (removed?.preview) URL.revokeObjectURL(removed.preview);
          return prev.filter(f => f.id !== id);
        });
      };

      const handleSort = () => {
        if (dragItem.current === null || dragOverItem.current === null) return;
        let _files = [...files];
        const draggedItemContent = _files.splice(dragItem.current, 1)[0];
        _files.splice(dragOverItem.current, 0, draggedItemContent);
        dragItem.current = null;
        dragOverItem.current = null;
        setFiles(_files);
      };

      const compressImage = async (imageElement, maxWidth, maxHeight, quality = 0.8) => {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        
        // Calculate new dimensions
        let { width, height } = imageElement;
        const ratio = Math.min(maxWidth / width, maxHeight / height);
        
        if (ratio < 1) {
          width = Math.round(width * ratio);
          height = Math.round(height * ratio);
        }
        
        canvas.width = width;
        canvas.height = height;
        
        // Draw and compress
        ctx.drawImage(imageElement, 0, 0, width, height);
        
        return new Promise((resolve) => {
          canvas.toBlob(resolve, 'image/jpeg', quality);
        });
      };

      const processDocxToText = async (file) => {
        if (!window.mammoth) await loadScript('https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js');
        const arrayBuffer = await file.arrayBuffer();
        const result = await window.mammoth.extractRawText({ arrayBuffer });
        return result.value;
      };

      const processExcelToText = async (file) => {
        if (!window.XLSX) await loadScript('https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js');
        const arrayBuffer = await file.arrayBuffer();
        const workbook = window.XLSX.read(arrayBuffer);
        let fullText = "";
        workbook.SheetNames.forEach(name => {
          fullText += `--- Sheet: ${name} ---\n`;
          const sheet = workbook.Sheets[name];
          fullText += window.XLSX.utils.sheet_to_txt(sheet) + "\n\n";
        });
        return fullText;
      };

      const exportAsWord = async () => {
        if (!window.docx) {
          await loadScript('https://unpkg.com/docx@7.8.2/build/index.js');
        }
        const docxLib = window.docx;
        if (!docxLib) throw new Error("Docx library not loaded");

        const { Document, Packer, Paragraph, TextRun, ImageRun, PageBreak, AlignmentType, PageOrientation, Footer } = docxLib;
        const isLandscape = settings.orientation === 'l';
        const accentHex = ac.hex.replace('#', '');

        const children = [];
        for (let i = 0; i < files.length; i++) {
          const item = files[i];
          setProgressMsg(`Processing ${item.name}...`);
          await yieldToMain();
          
          children.push(
            new Paragraph({
              alignment: AlignmentType.CENTER,
              children: [
                new TextRun({ text: `Source: ${item.name}`, bold: true, size: 28, color: accentHex, underline: {} })
              ],
            }),
            new Paragraph({ children: [] })
          );

          if (item.type.startsWith('image/')) {
            try {
              const arrayBuffer = await item.file.arrayBuffer();
              const uint8Array = new Uint8Array(arrayBuffer);
              
              const img = await new Promise((res, rej) => {
                const image = new Image();
                image.onload = () => res(image);
                image.onerror = () => rej(new Error("Failed to load image"));
                image.src = item.preview;
              });

              let width = img.width;
              let height = img.height;
              const maxWidth = isLandscape ? 700 : 500;
              
              if (width > maxWidth) {
                height = Math.round((height * maxWidth) / width);
                width = maxWidth;
              }
              
              children.push(
                new Paragraph({
                  alignment: AlignmentType.CENTER,
                  children: [
                    new ImageRun({
                      data: uint8Array,
                      transformation: { width, height },
                    }),
                  ],
                })
              );
            } catch (err) {
              children.push(new Paragraph({ children: [new TextRun({ text: `[Error loading image: ${item.name}]`, color: "EF4444" })] }));
            }
          } else {
            try {
              let text = "";
              if (item.extension === 'docx') text = await processDocxToText(item.file);
              else if (['xlsx', 'xls', 'csv'].includes(item.extension)) text = await processExcelToText(item.file);
              else text = await item.file.text();

              const lines = text.split('\n');
              for (let j = 0; j < lines.length; j++) {
                if (j % 1000 === 0) await yieldToMain(); 
                children.push(new Paragraph({ children: [new TextRun({ text: lines[j], size: 20 })] }));
              }
            } catch (err) {
              children.push(new Paragraph({ children: [new TextRun({ text: `[Error processing file content: ${item.name}]`, color: "EF4444" })] }));
            }
          }
          
          if (i !== files.length - 1) {
              children.push(new Paragraph({ children: [new PageBreak()] }));
          }
        }

        const doc = new Document({
          sections: [{
            properties: {
                page: {
                    size: { orientation: isLandscape ? PageOrientation.LANDSCAPE : PageOrientation.PORTRAIT },
                    margin: { top: 1440, right: 1440, bottom: 1440, left: 1440 },
                },
            },
            footers: {
              default: new Footer({
                children: [
                  new Paragraph({
                    alignment: AlignmentType.CENTER,
                    children: [
                      new TextRun({ text: "This file is converted by ConvertFlow", color: "94a3b8", size: 20, bold: true })
                    ]
                  })
                ]
              })
            },
            children
          }]
        });

        setProgressMsg(`Finalizing Document...`);
        await yieldToMain();
        
        const blob = await Packer.toBlob(doc);
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `ConvertFlow-${Date.now()}.docx`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      };

      const exportAsPDF = async () => {
        if (!window.jspdf) await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js');
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({
          orientation: settings.orientation,
          unit: 'mm',
          format: settings.format
        });

        const pageWidth = doc.internal.pageSize.getWidth();
        const pageHeight = doc.internal.pageSize.getHeight();
        const margin = 15;
        const contentWidth = pageWidth - (margin * 2);

        for (let i = 0; i < files.length; i++) {
          const item = files[i];
          if (i > 0) doc.addPage();

          setProgressMsg(`Processing ${item.name}...`);
          await yieldToMain();

          if (item.type.startsWith('image/')) {
            try {
              const img = await new Promise((res, rej) => {
                const image = new Image();
                image.onload = () => res(image);
                image.onerror = () => rej(new Error("Failed to load image"));
                image.src = item.preview;
              });
              
              // Calculate optimal display dimensions
              const imgRatio = img.width / img.height;
              const pageRatio = contentWidth / (pageHeight - (margin * 2));
              let dW, dH;
              if (imgRatio > pageRatio) {
                dW = contentWidth;
                dH = dW / imgRatio;
              } else {
                dH = pageHeight - (margin * 2);
                dW = dH * imgRatio;
              }
              
              // Compress image for PDF with quality settings
              const qualitySettings = {
                low: { max: 800, quality: 0.6 },
                medium: { max: 1200, quality: 0.85 },
                high: { max: 1600, quality: 0.95 }
              };
              const qSettings = qualitySettings[settings.imageQuality];
              const compressedBlob = await compressImage(img, Math.max(dW * 2, qSettings.max), Math.max(dH * 2, qSettings.max), qSettings.quality);
              const compressedUrl = URL.createObjectURL(compressedBlob);
              
              doc.addImage(compressedUrl, 'JPEG', (pageWidth - dW) / 2, (pageHeight - dH) / 2, dW, dH);
              URL.revokeObjectURL(compressedUrl); // Clean up
            } catch (err) {
              doc.setFontSize(10);
              doc.setTextColor(239, 68, 68);
              doc.text(`[Error loading image: ${item.name}]`, margin, margin + 10);
              doc.setTextColor(0, 0, 0);
            }
          } else {
            let text = "";
            try {
              if (item.extension === 'docx') text = await processDocxToText(item.file);
              else if (['xlsx', 'xls', 'csv'].includes(item.extension)) text = await processExcelToText(item.file);
              else text = await item.file.text();
            } catch (e) { text = `[Error processing ${item.name}]`; }

            doc.setFontSize(10);
            const lines = doc.splitTextToSize(text || " ", contentWidth);
            let cursorY = margin;
            
            for (let j = 0; j < lines.length; j++) {
              if (j % 500 === 0) await yieldToMain();
              
              if (cursorY > pageHeight - margin - 10) { 
                doc.addPage();
                cursorY = margin;
              }
              doc.text(lines[j], margin, cursorY);
              cursorY += 5;
            }
          }
        }
        
        // Add ConvertFlow Footer Watermark to ALL pages
        const pageCount = doc.internal.getNumberOfPages();
        for (let k = 1; k <= pageCount; k++) {
          doc.setPage(k);
          doc.setFontSize(10);
          doc.setTextColor(148, 163, 184);
          doc.text("This file is converted by ConvertFlow", pageWidth / 2, pageHeight - 8, { align: 'center' });
        }

        setProgressMsg(`Finalizing PDF...`);
        await yieldToMain();
        doc.save(`ConvertFlow-${Date.now()}.pdf`);
      };

      const handleExport = async () => {
        if (files.length === 0) return;
        
        // Validate files before conversion
        if (!validateFilesForConversion()) {
          return;
        }
        
        setIsGenerating(true);
        setPdfStatus('loading');
        setProgressMsg('Initializing Engine...');
        try {
          if (settings.outputFormat === 'pdf') await exportAsPDF();
          else await exportAsWord();
          
          setPdfStatus('success');
          setProgressMsg('');
          setTimeout(() => setPdfStatus('idle'), 3000);
        } catch (err) {
          console.error("Export failure:", err);
          setPdfStatus('error');
          setProgressMsg('');
          setTimeout(() => setPdfStatus('idle'), 4000);
        } finally {
          setIsGenerating(false);
        }
      };

      return (
        <div className={`min-h-screen transition-colors duration-500 font-sans selection:${ac.lightBg} ${
          isDark ? 'bg-slate-800 text-slate-100' : 'bg-[#f8fafc] text-slate-700'
        }`}>
          <div className="max-w-6xl mx-auto px-6 py-6 md:py-10">
            
            {/* Global Header (Unified layout) */}
            <header className={`flex flex-col sm:flex-row sm:items-center justify-between gap-6 pb-8 mb-8 border-b transition-colors ${
              isDark ? 'border-slate-700' : 'border-slate-200'
            }`}>
              <div className="flex items-center gap-4">
                <div className={`w-10 h-10 flex items-center justify-center rounded-xl shadow-lg transition-colors ${ac.mainBg} ${ac.shadow}`}>
                  <FileUp className="text-white" size={24} />
                </div>
                <div>
                  <h1 className={`text-2xl font-black tracking-tight italic leading-tight ${isDark ? 'text-white' : 'text-slate-900'}`}>
                    ConvertFlow
                  </h1>
                  <p className="text-[10px] font-bold uppercase tracking-[0.2em] opacity-50">Document Engine</p>
                </div>
              </div>
              
              <div className="flex items-center gap-3">
                {/* Accent Color Palette Pill */}
                <div className={`flex items-center h-[42px] px-4 rounded-full border transition-all ${
                  isDark 
                  ? 'bg-slate-700/80 border-slate-600 shadow-sm' 
                  : 'bg-white border-slate-200 shadow-sm'
                }`}>
                  <Palette size={18} className={`${isDark ? 'text-slate-400' : 'text-slate-400'} mr-3`} strokeWidth={2} />
                  <div className="flex items-center gap-2">
                    {Object.entries(ACCENT_COLORS).map(([key, value]) => (
                      <button
                        key={key}
                        onClick={() => setAccent(key)}
                        className={`rounded-full transition-all duration-300 flex-shrink-0 flex items-center justify-center ${
                          accent === key 
                          ? `w-[20px] h-[20px] ring-[1.5px] ring-offset-[2px] ring-offset-${isDark ? 'slate-800' : 'white'} ${value.ring}` 
                          : 'w-[16px] h-[16px] hover:scale-110 opacity-80 hover:opacity-100'
                        }`}
                        style={{ backgroundColor: value.hex, color: value.hex }}
                        title={value.name}
                        aria-label={`Set theme to ${value.name}`}
                      >
                        {accent === key && <div className={`w-[12px] h-[12px] rounded-full ${isDark ? 'bg-slate-700' : 'bg-white'}`}>
                          <div className="w-full h-full rounded-full" style={{backgroundColor: value.hex}}></div>
                        </div>}
                      </button>
                    ))}
                  </div>
                </div>

                {/* Dark/Light Mode Squircle */}
                <button 
                  onClick={() => setIsDark(!isDark)}
                  className={`flex items-center justify-center w-[42px] h-[42px] rounded-[14px] border transition-all ${
                    isDark 
                    ? 'bg-slate-700 border-slate-600 text-slate-300 hover:bg-slate-600 hover:text-white shadow-sm' 
                    : 'bg-white border-slate-200 text-slate-500 hover:text-slate-900 hover:bg-slate-50 shadow-sm'
                  }`}
                  title="Toggle Theme"
                >
                  {isDark ? <Sun size={18} strokeWidth={2.5} /> : <Moon size={18} strokeWidth={2.5} />}
                </button>
              </div>
            </header>

            {/* Two-Column Main Layout */}
            <div className="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
              
              {/* LEFT COLUMN: Control Panel (Preferences, Stats, Action) */}
              <div className="lg:col-span-4 space-y-6 lg:sticky lg:top-8">
                
                {/* Preferences Card */}
                <div className={`rounded-3xl border transition-colors overflow-hidden ${
                  isDark ? 'bg-slate-700/40 border-slate-600' : 'bg-white border-slate-200 shadow-sm'
                }`}>
                  <div className={`px-6 py-5 border-b flex items-center justify-between ${isDark ? 'border-slate-600 bg-slate-700/50' : 'border-slate-100 bg-slate-50/50'}`}>
                    <div className="flex items-center gap-2.5">
                      <Settings2 size={18} className={ac.mainText} />
                      <h3 className={`font-bold text-sm ${isDark ? 'text-white' : 'text-slate-900'}`}>Configuration</h3>
                    </div>
                  </div>

                  <div className="p-6 space-y-6">
                    {/* Format Selector */}
                    <div>
                      <label className="text-[10px] font-black uppercase tracking-[0.15em] opacity-60 block mb-3">1. Output Format</label>
                      <div className="grid grid-cols-2 gap-3">
                        {[
                          { id: 'pdf', label: 'PDF Document', icon: FileBox },
                          { id: 'docx', label: 'Word Document', icon: FileText }
                        ].map((f) => (
                          <button 
                            key={f.id}
                            onClick={() => setSettings(s => ({ ...s, outputFormat: f.id }))}
                            className={`flex flex-col items-center justify-center gap-2 p-4 rounded-2xl border-[1.5px] transition-all ${
                              settings.outputFormat === f.id 
                                ? `${ac.border} ${ac.lightBg} ${ac.mainText} dark:text-white dark:${ac.lightBg}` 
                                : isDark ? 'border-slate-600 text-slate-300 hover:border-slate-500 hover:text-white' : 'border-slate-200 text-slate-500 hover:border-slate-300'
                            }`}
                          >
                            <f.icon size={22} strokeWidth={1.5} />
                            <span className="text-[11px] font-bold tracking-wide text-center">{f.label}</span>
                          </button>
                        ))}
                      </div>
                    </div>

                    {/* Layout Selector */}
                    <div>
                      <label className="text-[10px] font-black uppercase tracking-[0.15em] opacity-60 block mb-3">2. Orientation</label>
                      <div className="grid grid-cols-2 gap-3">
                        {['p', 'l'].map((o) => (
                          <button 
                            key={o}
                            onClick={() => setSettings(s => ({ ...s, orientation: o }))}
                            className={`flex flex-col items-center justify-center gap-2 p-3 rounded-2xl border-[1.5px] transition-all ${
                              settings.orientation === o 
                                ? `${ac.border} ${ac.lightBg} ${ac.mainText} dark:text-white dark:${ac.lightBg}`
                                : isDark ? 'border-slate-600 text-slate-300 hover:border-slate-500 hover:text-white' : 'border-slate-200 text-slate-500 hover:border-slate-300'
                            }`}
                          >
                            <div className={`${o === 'p' ? 'w-4 h-6' : 'w-6 h-4'} border-[1.5px] border-current rounded-sm`}></div>
                            <span className="text-[11px] font-bold tracking-wide text-center">{o === 'p' ? 'Portrait' : 'Landscape'}</span>
                          </button>
                        ))}
                      </div>
                    </div>

                    {/* Image Quality Selector */}
                    <div>
                      <label className="text-[10px] font-black uppercase tracking-[0.15em] opacity-60 block mb-3">3. Image Quality</label>
                      <div className="grid grid-cols-3 gap-2">
                        {[
                          { id: 'low', label: 'Low', desc: 'Smallest file' },
                          { id: 'medium', label: 'Medium', desc: 'Balanced' },
                          { id: 'high', label: 'High', desc: 'Best quality' }
                        ].map((q) => (
                          <button 
                            key={q.id}
                            onClick={() => setSettings(s => ({ ...s, imageQuality: q.id }))}
                            className={`flex flex-col items-center justify-center gap-1 p-2 rounded-xl border-[1.5px] transition-all ${
                              settings.imageQuality === q.id 
                                ? `${ac.border} ${ac.lightBg} ${ac.mainText} dark:text-white dark:${ac.lightBg}`
                                : isDark ? 'border-slate-600 text-slate-300 hover:border-slate-500 hover:text-white' : 'border-slate-200 text-slate-500 hover:border-slate-300'
                            }`}
                          >
                            <span className="text-[10px] font-bold tracking-wide text-center">{q.label}</span>
                            <span className="text-[8px] opacity-60 text-center">{q.desc}</span>
                          </button>
                        ))}
                      </div>
                    </div>
                  </div>
                </div>

                {/* Status & Action Card */}
                <div className={`rounded-3xl border p-6 flex flex-col transition-colors ${
                  isDark ? 'bg-slate-700/40 border-slate-600' : 'bg-white border-slate-200 shadow-sm'
                }`}>
                  <div className="flex items-center justify-between mb-6">
                    <div className="flex items-center gap-2 text-sm font-medium">
                      <List size={18} className={ac.mainText} />
                      <span>Queue</span>
                    </div>
                    <div className={`px-3 py-1 rounded-full text-xs font-bold ${files.length > 0 ? ac.mainText + ' ' + ac.lightBg : 'bg-slate-100 text-slate-400 dark:bg-slate-700 dark:text-slate-300'}`}>
                      {files.length} {files.length === 1 ? 'File' : 'Files'}
                    </div>
                  </div>

                  <div className={`flex items-center gap-2 text-xs font-medium px-4 py-3 rounded-2xl mb-6 ${
                    isDark ? 'bg-emerald-500/10 text-emerald-400' : 'bg-emerald-50 text-emerald-600'
                  }`}>
                    <Shield size={16} /> Data processed locally
                  </div>

                  <button 
                    onClick={handleExport}
                    disabled={files.length === 0 || isGenerating}
                    className={`w-full flex items-center justify-center gap-3 py-4 rounded-2xl font-bold transition-all shadow-lg active:scale-[0.98] ${
                      pdfStatus === 'error' 
                      ? 'bg-rose-600 text-white shadow-rose-600/20' 
                      : `${ac.mainBg} ${ac.mainHover} text-white ${ac.shadow}`
                    } disabled:bg-slate-300 disabled:text-slate-500 disabled:shadow-none dark:disabled:bg-slate-700 dark:disabled:text-slate-400`}
                  >
                    {isGenerating ? <Loader2 size={20} className="animate-spin" /> : <Download size={20} />}
                    {pdfStatus === 'error' ? 'RETRY' : isGenerating ? 'PROCESSING...' : `GENERATE ${settings.outputFormat.toUpperCase()}`}
                  </button>
                </div>

              </div>

              {/* RIGHT COLUMN: Workspace (Upload & File List) */}
              <div className="lg:col-span-8 space-y-6">
                
                {/* Header & Reset */}
                <div className="flex items-center justify-between px-2">
                  <h2 className={`font-bold text-lg ${isDark ? 'text-white' : 'text-slate-900'}`}>Workspace</h2>
                  {files.length > 0 && (
                    <button 
                      onClick={() => setFiles([])} 
                      className="text-xs font-bold text-slate-400 hover:text-rose-500 transition-colors uppercase tracking-wider"
                    >
                      Clear All
                    </button>
                  )}
                </div>

                {/* Drop Zone */}
                <div 
                  onDragOver={(e) => { e.preventDefault(); setIsDragging(true); }}
                  onDragLeave={() => setIsDragging(false)}
                  onDrop={(e) => { e.preventDefault(); setIsDragging(false); handleFiles(e.dataTransfer.files); }}
                  onClick={() => fileInputRef.current.click()}
                  className={`relative border-2 border-dashed rounded-3xl transition-all cursor-pointer flex flex-col items-center justify-center gap-3 group overflow-hidden ${
                    files.length > 0 ? 'h-32' : 'h-72' // Dynamic height adjustment
                  } ${
                    isDragging 
                    ? `${ac.border} ${ac.lightBg} scale-[1.01]` 
                    : isDark 
                      ? 'border-slate-600 hover:border-slate-500 hover:bg-slate-700/50' 
                      : 'border-slate-300 hover:border-slate-400 hover:bg-slate-50'
                  }`}
                >
                  <input type="file" ref={fileInputRef} onChange={(e) => handleFiles(e.target.files)} multiple accept="image/*,.txt,.docx,.doc,.pdf,.xlsx,.xls,.csv,.json,.js,.css,.html,.ts,.tsx,.py,.java,.cpp" className="hidden" />
                  
                  <div className={`rounded-full flex items-center justify-center transition-all group-hover:-translate-y-1 ${
                    files.length > 0 ? 'w-10 h-10 bg-transparent text-slate-400 group-hover:'+ac.iconText : `w-16 h-16 ${isDark ? 'bg-slate-700 border border-slate-600' : 'bg-slate-100'} text-slate-400 group-hover:${ac.iconText}`
                  }`}>
                    <FilePlus size={files.length > 0 ? 24 : 32} />
                  </div>
                  
                  <div className="text-center px-4">
                    <p className={`font-bold ${files.length > 0 ? 'text-sm' : 'text-lg mb-1'} ${isDark ? 'text-slate-200 group-hover:text-white' : 'text-slate-600 group-hover:text-slate-900'}`}>
                      {files.length > 0 ? 'Click or drag to add more files' : 'Drop your files here'}
                    </p>
                    {files.length === 0 && (
                      <p className="text-sm opacity-50 max-w-sm mx-auto">Supports images, spreadsheets, and text documents.</p>
                    )}
                  </div>
                </div>

                {/* File List (Structured Rows) */}
                {files.length > 0 && (
                  <div className="space-y-3">
                    {files.map((file, index) => (
                      <div 
                        key={file.id} 
                        draggable
                        onDragStart={() => (dragItem.current = index)}
                        onDragEnter={() => (dragOverItem.current = index)}
                        onDragEnd={handleSort}
                        onDragOver={(e) => e.preventDefault()}
                        className={`group border rounded-2xl p-3 pl-2 flex items-center gap-4 transition-all cursor-grab active:cursor-grabbing hover:shadow-sm ${
                          isDark 
                          ? 'bg-slate-700/40 border-slate-600 hover:border-slate-500 hover:bg-slate-700/80' 
                          : 'bg-white border-slate-200 hover:border-slate-300'
                        }`}
                      >
                        <div className="cursor-grab text-slate-400 opacity-40 group-hover:opacity-100 transition-opacity p-1">
                          <GripVertical size={18} />
                        </div>
                        
                        <div className={`w-12 h-12 rounded-xl flex-shrink-0 overflow-hidden flex items-center justify-center border ${
                          isDark ? 'bg-slate-800 border-slate-600' : 'bg-slate-50 border-slate-100'
                        }`}>
                          {file.preview ? <img src={file.preview} alt="preview" className="w-full h-full object-cover" /> : getFileIcon(file.type, file.name)}
                        </div>
                        
                        <div className="flex-1 min-w-0 pointer-events-none pr-4">
                          <p className={`text-sm font-bold truncate ${isDark ? 'text-white' : 'text-slate-900'}`}>{file.name}</p>
                          <div className="flex items-center gap-2 mt-0.5">
                            <span className={`text-[10px] font-bold uppercase tracking-wider px-1.5 py-0.5 rounded ${isDark ? 'bg-slate-600 text-slate-300' : 'bg-slate-500/10 text-slate-500'}`}>
                              {file.extension}
                            </span>
                            <span className={`text-[11px] font-medium ${isDark ? 'text-slate-400' : 'text-slate-500'}`}>{file.size}</span>
                          </div>
                        </div>
                        
                        <button 
                          onClick={(e) => { e.stopPropagation(); removeFile(file.id); }} 
                          className={`p-2.5 rounded-xl transition-all mr-1 ${isDark ? 'text-slate-400 hover:text-rose-400 hover:bg-rose-500/10' : 'text-slate-400 hover:text-rose-500 hover:bg-rose-500/10'}`}
                          title="Remove file"
                        >
                          <Trash2 size={18} />
                        </button>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>

            {/* Detailed Status Toasts */}
            {pdfStatus === 'loading' && progressMsg && (
              <div className={`fixed bottom-10 left-1/2 -translate-x-1/2 px-8 py-4 rounded-full font-bold shadow-2xl flex items-center gap-3 animate-in fade-in slide-in-from-bottom-5 duration-300 z-50 border ${
                isDark ? 'bg-slate-700 text-white border-slate-600' : 'bg-slate-900 text-white border-slate-800'
              }`}>
                <Loader2 size={20} className={`animate-spin ${ac.iconText}`} />
                {progressMsg}
              </div>
            )}

            {pdfStatus === 'success' && (
              <div className="fixed bottom-10 left-1/2 -translate-x-1/2 bg-emerald-600 text-white px-8 py-4 rounded-full font-black shadow-2xl flex items-center gap-3 animate-in fade-in slide-in-from-bottom-5 duration-300 z-50">
                <CheckCircle2 size={24} />
                CONVERSION SUCCESS!
              </div>
            )}

            {pdfStatus === 'error' && (
              <div className="fixed bottom-10 left-1/2 -translate-x-1/2 bg-rose-600 text-white px-8 py-4 rounded-full font-black shadow-2xl flex items-center gap-3 animate-in fade-in slide-in-from-bottom-5 duration-300 z-50 max-w-md text-center">
                <AlertCircle size={24} />
                <span>{progressMsg || 'FAILED. CHECK CONSOLE.'}</span>
              </div>
            )}

            {/* Footer */}
            <footer className={`mt-16 pt-8 border-t transition-colors ${
              isDark ? 'border-slate-700' : 'border-slate-200'
            }`}>
              <div className="text-center space-y-2">
                <p className={`text-sm font-medium ${isDark ? 'text-slate-400' : 'text-slate-500'}`}>
                  © 2026 ConvertFlow. All rights reserved.
                </p>
                <p className={`text-xs ${isDark ? 'text-slate-500' : 'text-slate-400'}`}>
                  Developed by Ashish Kumar Sankhua
                </p>
              </div>
            </footer>
          </div>
        </div>
      );
    };

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
